---
name: Windows AMD64 Test Build
permissions: {}

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Build version label
        required: false
        type: string
        default: ''

jobs:
  build_windows_amd64:
    name: Windows-AMD64
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    permissions:
      contents: read
    env:
      MATRIX_MSYSTEM: ucrt64
      TOOLCHAIN: ucrt-x86_64
      BUILD_VERSION: ${{ inputs.release_version != '' && inputs.release_version || format('test-{0}', github.run_number) }}
      BRANCH: ${{ github.head_ref || github.ref_name }}
      COMMIT: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive

      - name: Setup Dependencies Windows
        uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda  # v2.30.0
        with:
          msystem: ${{ env.MATRIX_MSYSTEM }}
          update: true
          install: >-
            git

      - name: Update Windows dependencies
        run: |
          dependencies=(
            "git"
            "mingw-w64-${TOOLCHAIN}-boost"
            "mingw-w64-${TOOLCHAIN}-cmake"
            "mingw-w64-${TOOLCHAIN}-cppwinrt"
            "mingw-w64-${TOOLCHAIN}-curl-winssl"
            "mingw-w64-${TOOLCHAIN}-gcc"
            "mingw-w64-${TOOLCHAIN}-miniupnpc"
            "mingw-w64-${TOOLCHAIN}-MinHook"
            "mingw-w64-${TOOLCHAIN}-nlohmann-json"
            "mingw-w64-${TOOLCHAIN}-nodejs"
            "mingw-w64-${TOOLCHAIN}-nsis"
            "mingw-w64-${TOOLCHAIN}-onevpl"
            "mingw-w64-${TOOLCHAIN}-openssl"
            "mingw-w64-${TOOLCHAIN}-opus"
            "mingw-w64-${TOOLCHAIN}-toolchain"
          )
          pacman -Syu --noconfirm "${dependencies[@]}"

      - name: Build Windows AMD64
        run: |
          mkdir -p build
          cmake \
            -B build \
            -G Ninja \
            -S . \
            -DBUILD_WERROR=ON \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DSUNSHINE_ASSETS_DIR=assets \
            -DSUNSHINE_PUBLISHER_NAME="${GITHUB_REPOSITORY_OWNER}" \
            -DSUNSHINE_PUBLISHER_WEBSITE="https://app.lizardbyte.dev" \
            -DSUNSHINE_PUBLISHER_ISSUE_URL="https://app.lizardbyte.dev/support"
          echo "::add-matcher::.github/matchers/gcc.json"
          ninja -C build
          echo "::remove-matcher owner=gcc::"

      - name: Package Windows AMD64
        run: |
          mkdir -p artifacts
          cd build
          cpack -G NSIS
          mv ./cpack_artifacts/Sunshine.exe ../artifacts/Sunshine-Windows-AMD64-installer.exe

      - name: Upload Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: build-Windows-AMD64
          path: artifacts/
          if-no-files-found: error
